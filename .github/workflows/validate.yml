name: validate

on:
  push:
  pull_request:

jobs:
  student-project:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
          cache: pip
      - run: pip install pandas numpy sacrebleu
      - run: python scripts/validate_project.py
      - run: python scripts/smoke_test_notebooks.py
